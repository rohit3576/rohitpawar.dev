<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body data-barba="wrapper">
    <div class="cursor"></div>
    <div class="cursor-follower"></div>
    <div id="global-bg-3d"></div>

    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">RP<span>.</span></a>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Home</a>
                <a href="about.html" class="nav-link">About</a>
                <a href="projects.html" class="nav-link active">Projects</a>
                <a href="contact.html" class="nav-link">Contact</a>
            </div>
            <button class="mobile-toggle" aria-label="Toggle menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>

    <div class="mobile-menu">
        <a href="index.html" class="nav-link">Home</a>
        <a href="about.html" class="nav-link">About</a>
        <a href="projects.html" class="nav-link active">Projects</a>
        <a href="contact.html" class="nav-link">Contact</a>
    </div>

    <main data-barba="container" data-barba-namespace="projects">
        <section class="projects-hero">
            <div class="container">
                <h1 class="section-title">My Work</h1>
                <p class="section-description">A collection of projects focusing on AI integration, web development, and scalable web architectures.</p>
                
                <div class="projects-grid">
                    <!-- Projects populated by js/projects.js -->
                </div>
            </div>
        </section>

        <!-- Project Modal -->
        <div id="project-modal" class="modal">
            <div class="modal-content glass-form">
                <span class="close-btn">&times;</span>
                <div class="modal-body">
                    <div class="modal-image-container">
                        <img id="modal-image" src="" alt="Project Image">
                    </div>
                    <div class="modal-info">
                        <h2 id="modal-title"></h2>
                        <div id="modal-tech" class="tech-stack"></div>
                        <p id="modal-description"></p>
                        <div class="modal-links">
                            <a id="modal-live" href="#" target="_blank" class="btn-primary">Live Demo</a>
                            <a id="modal-github" href="#" target="_blank" class="btn-secondary">GitHub</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-content">
            <h3>Rohit Pawar</h3>
            <p>Full Stack & AI Developer</p>
            <div class="footer-links">
                <a href="index.html">Home</a>
                <a href="about.html">About</a>
                <a href="projects.html">Projects</a>
                <a href="contact.html">Contact</a>
            </div>
            <p class="copyright">© 2026 Rohit Pawar</p>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.158.0/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://unpkg.com/@barba/core"></script>
    <script src="https://unpkg.com/lenis@1.1.13/dist/lenis.min.js"></script>
    <script src="js/threeScene.js"></script>
    <script src="js/background3d.js"></script>
    <script src="js/hero3d.js"></script>
    <script src="js/animations.js"></script>
    <script src="js/transitions.js"></script>
    <script src="js/projects.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
